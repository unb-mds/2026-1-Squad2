name: Atualiza Métricas SCRUM

on:
  schedule:
    - cron: '0 3 * * 0'   # Todo domingo às 03:00 UTC
  workflow_dispatch:        # Permite execução manual pela UI do GitHub

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install PyGithub

      - name: Executar analyzer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python metrics/analyzer.py

      - name: Garantir estrutura de pastas
        run: mkdir -p docs/scrum

      - name: Commit e push das métricas atualizadas
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/scrum/metrics.json
          git diff --staged --quiet || git commit -m "chore: atualiza métricas scrum [skip ci]"
          git push