# Simple workflow for deploying MkDocs to GitHub Pages
name: Deploy MkDocs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Instala dependências e constrói o HTML
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install mkdocs-material
        # Se você usar plugins extras no futuro, basta adicionar no comando acima
        
      - name: Build site
        run: mkdocs build

      # Inclui o dashboard de métricas SCRUM no site gerado.
      # O MkDocs não copia pastas fora do seu escopo — fazemos isso manualmente.
      # Resultado: Pages serve o dashboard em <url-base>/scrum/
      - name: Incluir métricas SCRUM no site
        run: |
          if [ -d "docs/scrum" ]; then
            cp -r docs/scrum site/scrum
          else
            echo "docs/scrum não encontrada — pulando."
          fi
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # O MkDocs salva o site gerado nesta pasta por padrão
          path: './site'

  # Job 2: Pega o artefato gerado acima e publica
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5